name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-release:
    name: Windows NSIS release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify release configuration
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          $placeholder = "OWNER" + "/REPO"
          git grep -n $placeholder
          if ($LASTEXITCODE -eq 0) {
            throw "Release repository placeholder is still present."
          }
          if ($LASTEXITCODE -ne 1) {
            exit $LASTEXITCODE
          }
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "TAURI_SIGNING_PRIVATE_KEY is not configured."
          }

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Build frontend
        run: npm run build

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --locked

      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Run Playwright
        run: npm run test:e2e

      - name: Build and upload Tauri artifacts
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SSHNet Share ${{ github.ref_name }}"
          releaseBody: |
            SSHNet Share early release.

            Windows builds are not code-signed yet. Windows may show "Unknown Publisher" or SmartScreen prompts.

            The app does not automatically upload telemetry, logs, crash reports, or diagnostics. Diagnostic ZIP files are exported locally and must be submitted manually by the user.
          releaseDraft: true
          prerelease: false
          args: --ci --bundles nsis
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
